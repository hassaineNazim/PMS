<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel PMS - Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2a2f47;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .login-logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }

    .login-logo-text { font-size: 1.2rem; font-weight: 700; }
    .login-logo-sub  { font-size: 0.75rem; color: var(--text-muted); }

    .login-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }

    .login-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">&#127976;</div>
      <div>
        <div class="login-logo-text">Hotel PMS</div>
        <div class="login-logo-sub">Property Management</div>
      </div>
    </div>

    <div class="login-title">Sign In</div>
    <div class="login-sub">Enter your credentials to access the dashboard</div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
  </div>

  <script>
    // If already logged in, redirect to dashboard
    (async function checkAuth() {
      try {
        var res = await fetch('/api/auth/me');
        if (res.ok) {
          window.location.href = '/';
        }
      } catch (e) { /* not logged in */ }
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        var data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
